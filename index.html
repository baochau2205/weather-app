<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero-card">
        <div class="hero-top">
          <div>
            <p class="eyebrow">Weather app</p>
            <h1>Weather by city</h1>
          </div>
          <form id="weather-form" class="search-bar">
            <input id="city-input" type="text" placeholder="Enter a city name" />
            <button type="submit">Search</button>
          </form>
        </div>

        <div class="city-pills" id="city-pills"></div>

        <div class="status-card" id="current-weather"></div>
      </header>

      <main class="content-grid">
        <section class="panel">
          <div class="panel-title-row">
            <h2>Time frame</h2>
            <span>AM / PM</span>
          </div>
          <div class="timeline" id="timeline"></div>
        </section>

        <section class="panel">
          <div class="panel-title-row">
            <h2>7-day forecast</h2>
            <span>Monday → Sunday</span>
          </div>
          <div class="forecast-list" id="forecast-list"></div>
        </section>
      </main>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
